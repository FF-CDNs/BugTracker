<!doctype html>
<html lang="en">
    <head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="">
	<title>Frozen Forest - Hata Raporu</title>

	<link rel="canonical" href="https://getbootstrap.com/docs/5.0/examples/checkout/">

	<!-- CSS only -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">

	<meta name="theme-color" content="#7952b3">
    </head>
    <body class="bg-light">
	
	<div class="container">
	    <main>
		<div class="py-5 text-center">
		    <h2>Hata Raporlama</h2>
		</div>

		<div class="row g-5">
		    <div class="col-12">
			<form class="needs-validation" novalidate id="my-form">
			    <div class="row g-3">
				<div class="col-12">
				    <label for="firstName" class="form-label">Şirket İsmi</label>
				    <input type="text" class="form-control" id="companyName"  placeholder="Şirket İsminiz (Zorunlu alan.)" required>
				    <div class="invalid-feedback">
					Valid first name is required.
				    </div>
				</div>

				<div class="col-12">
				    <label for="lastName" class="form-label">İletişim Bilgisi</label>
				    <input type="text" class="form-control" id="contact" placeholder="İletişim Bilgisi (Zorunlu alan.)" required>
				    <div class="invalid-feedback">
					Valid last name is required.
				    </div>
				</div>

				<div class="col-12">
				    <label for="lastName" class="form-label">Hata Başlığı</label>
				    <input type="text" class="form-control" id="errorTitle" placeholder="Hata Başlığı (Zorunlu alan. Türkçe karakter kullanmadan yazınız.)" required>
				    <div class="invalid-feedback">
					Valid last name is required.
				    </div>
				</div>

				<div class="col-12">
				    <label for="lastName" class="form-label">Hata Açıklaması</label>
				    <textarea type="text" class="form-control" id="errorDetail" placeholder="Hata Açıklaması (Zorunlu alan)" required></textarea>
				    <div class="invalid-feedback">
					Valid last name is required.
				    </div>
				</div>

				<div class="col-12">
				    <label for="lastName" class="form-label">Ekran Görüntüsü</label>
				    <textarea type="text" class="form-control" id="screenshot" placeholder="CTRL V yaparak seçtiğiniz resmi yapıştırınız."></textarea>
					<div class="invalid-feedback">
					Valid last name is required.
				    </div>
				</div>
			    </div>

			    <hr class="my-4">

			    <button class="w-100 btn btn-primary btn-lg mb-4" type="submit">Göndermek için Tıklayınız.</button>
			</form>
		    </div>
		</div>
	    </main>
	</div>


	<!-- JavaScript Bundle with Popper -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js" integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf" crossorigin="anonymous"></script>

	<script src="https://smtpjs.com/v3/smtp.js"></script>
	<script>
	 document.addEventListener('submit', function (event) {
	     event.preventDefault();
	     var company = document.getElementById('companyName').value;
	     var contact = document.getElementById('contact').value;
	     var errorTitle = document.getElementById('errorTitle').value;
	     var errorDetail = document.getElementById('errorDetail').value;
	     var screenshot = document.getElementById('screenshot').value;
	     Email.send({
		 SecureToken : "07fcfa5a-6ab4-48fd-9cc6-6ba669958cf6",
		 To : 'requests@ffreality.com',
		 From : 'form@ffreality.com',
		 Subject : company + " " + "Hata Raporu",
		 Body : "Şirket: " + company + "<br>" + "İletişim: " + contact + "<br>" +
			"Hata Başlığı: " + errorTitle + "<br>" + "Hata Detayı: " + errorDetail,
		 Attachments : [
		     {
			 name : "screenshot.png",
			 data : screenshot
		     }]
	     })
	 });
	</script>
    </body>
</html>
